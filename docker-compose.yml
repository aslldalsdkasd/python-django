version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    command:
      - "gunicorn"
      - "mysite.wsgi:application"
      - "--bind"
      - "0.0.0.0:8000"
    restart: always
    logging:
      driver: 'json-file'
      options:
        max-size: '200k'
        max-file: '10'
    ports:
      - "8000:8000"
    volumes:
      - ./mysite/db:/app/db
    env_file:
      - .env

